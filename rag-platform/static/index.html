<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Document Intelligence Platform</title>
<style>
  :root {
    --ink: #1a1d24;
    --paper: #f7f5f0;
    --panel: #ffffff;
    --line: #ddd8cc;
    --accent: #8a4f2e;
    --accent-soft: #f0e4d8;
    --muted: #6b6b63;
    --good: #3d6b4f;
    --mono: "IBM Plex Mono", "SF Mono", Consolas, monospace;
    --serif: "IBM Plex Serif", Georgia, serif;
    --sans: "IBM Plex Sans", -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
  }

  .shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }

  .wordmark {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .wordmark span { color: var(--accent); }

  .status-line {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 5px;
  }
  .dot.on { background: var(--good); }
  .dot.off { background: #b5474e; }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 28px;
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
  }

  .panel-head {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }

  /* Upload zone */
  .dropzone {
    margin: 16px;
    border: 1.5px dashed var(--line);
    padding: 28px 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .dropzone:hover, .dropzone.drag {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .dropzone svg { opacity: 0.5; margin-bottom: 8px; }
  .dropzone-label {
    font-size: 13px;
    color: var(--muted);
  }
  .dropzone-label strong { color: var(--ink); }
  input[type=file] { display: none; }

  .doc-list {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 380px;
    overflow-y: auto;
  }

  .doc-item {
    border: 1px solid var(--line);
    padding: 10px 12px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .doc-item .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .doc-item .meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .doc-item button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
  }
  .doc-item button:hover { color: #b5474e; }

  .empty-note {
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  /* Chat area */
  .chat-panel {
    display: flex;
    flex-direction: column;
    height: 640px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .msg { max-width: 88%; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  .msg .role {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .msg.user .bubble {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.assistant .bubble {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .mode-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 8px;
    padding: 2px 6px;
    border: 1px solid var(--line);
    color: var(--muted);
  }

  .sources {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .source-chip {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    border-top: 1px dotted var(--line);
    padding-top: 6px;
  }
  .source-chip b { color: var(--ink); }

  .composer {
    border-top: 1px solid var(--line);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
  }

  .composer input {
    flex: 1;
    border: 1px solid var(--line);
    padding: 10px 12px;
    font-size: 14px;
    font-family: var(--sans);
    background: var(--paper);
  }
  .composer input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .composer button {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0 20px;
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .composer button:hover { background: var(--accent); }
  .composer button:disabled { opacity: 0.4; cursor: default; }

  .placeholder-msg {
    margin: auto;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    max-width: 320px;
  }

  .loader {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .loader::after {
    content: "";
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ""; }
    25% { content: "."; }
    50% { content: ".."; }
    75% { content: "..."; }
  }
</style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="wordmark">Document<span>Intel</span></div>
      <div class="status-line" id="statusLine">
        <span><span class="dot off" id="ollamaDot"></span><span id="ollamaText">checking engine…</span></span>
        <span id="chunkCount">0 chunks indexed</span>
      </div>
    </header>

    <div class="layout">
      <!-- Left: document management -->
      <div class="panel">
        <div class="panel-head">Indexed Documents</div>

        <label class="dropzone" id="dropzone" for="fileInput">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 16v3a1 1 0 001 1h14a1 1 0 001-1v-3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="dropzone-label"><strong>Upload a document</strong><br/>PDF, DOCX, or TXT</div>
        </label>
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" />

        <div class="doc-list" id="docList">
          <div class="empty-note">No documents indexed yet.</div>
        </div>
      </div>

      <!-- Right: chat -->
      <div class="panel chat-panel">
        <div class="panel-head">Ask a Question</div>
        <div class="messages" id="messages">
          <div class="placeholder-msg">
            Upload a document on the left, then ask a question about its contents.
            Answers are generated only from what's indexed — nothing is sent to an external API.
          </div>
        </div>
        <div class="composer">
          <input type="text" id="questionInput" placeholder="Ask about your documents…" />
          <button id="sendBtn">Ask</button>
        </div>
      </div>
    </div>
  </div>

<script>
const API = "";

async function refreshStatus() {
  try {
    const res = await fetch(`${API}/api/status`);
    const data = await res.json();
    document.getElementById("chunkCount").textContent = `${data.indexed_chunks} chunks indexed`;
    const dot = document.getElementById("ollamaDot");
    const text = document.getElementById("ollamaText");
    if (data.ollama_available) {
      dot.className = "dot on";
      text.textContent = "LLM engine connected";
    } else {
      dot.className = "dot off";
      text.textContent = "no LLM — extractive mode";
    }
  } catch (e) {
    console.error("status check failed", e);
  }
}

async function refreshDocs() {
  const res = await fetch(`${API}/api/documents`);
  const data = await res.json();
  const list = document.getElementById("docList");
  if (!data.documents.length) {
    list.innerHTML = `<div class="empty-note">No documents indexed yet.</div>`;
    return;
  }
  list.innerHTML = data.documents.map(d => `
    <div class="doc-item">
      <div>
        <div class="name">${escapeHtml(d.source)}</div>
        <div class="meta">${d.chunks} chunks · ${d.doc_id}</div>
      </div>
      <button onclick="deleteDoc('${d.doc_id}')" title="Remove">&times;</button>
    </div>
  `).join("");
}

async function deleteDoc(docId) {
  await fetch(`${API}/api/documents/${docId}`, { method: "DELETE" });
  await refreshDocs();
  await refreshStatus();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

const fileInput = document.getElementById("fileInput");
const dropzone = document.getElementById("dropzone");

fileInput.addEventListener("change", async (e) => {
  if (e.target.files.length) await uploadFile(e.target.files[0]);
});

["dragover", "dragleave", "drop"].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    if (evt === "dragover") dropzone.classList.add("drag");
    else dropzone.classList.remove("drag");
  });
});
dropzone.addEventListener("drop", async (e) => {
  if (e.dataTransfer.files.length) await uploadFile(e.dataTransfer.files[0]);
});

async function uploadFile(file) {
  dropzone.querySelector(".dropzone-label").innerHTML = `<strong>Indexing "${escapeHtml(file.name)}"…</strong>`;
  const formData = new FormData();
  formData.append("file", file);
  try {
    const res = await fetch(`${API}/api/upload`, { method: "POST", body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Upload failed");
    dropzone.querySelector(".dropzone-label").innerHTML = `<strong>Upload a document</strong><br/>PDF, DOCX, or TXT`;
    await refreshDocs();
    await refreshStatus();
  } catch (err) {
    dropzone.querySelector(".dropzone-label").innerHTML = `<strong style="color:#b5474e">${escapeHtml(err.message)}</strong>`;
    setTimeout(() => {
      dropzone.querySelector(".dropzone-label").innerHTML = `<strong>Upload a document</strong><br/>PDF, DOCX, or TXT`;
    }, 3000);
  }
  fileInput.value = "";
}

const messages = document.getElementById("messages");
const questionInput = document.getElementById("questionInput");
const sendBtn = document.getElementById("sendBtn");

function clearPlaceholder() {
  const ph = messages.querySelector(".placeholder-msg");
  if (ph) ph.remove();
}

function addUserMessage(text) {
  clearPlaceholder();
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = `<div class="role">You</div><div class="bubble">${escapeHtml(text)}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addLoadingMessage() {
  const div = document.createElement("div");
  div.className = "msg assistant";
  div.id = "loadingMsg";
  div.innerHTML = `<div class="role">DocumentIntel</div><div class="bubble"><span class="loader">Retrieving and generating</span></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addAssistantMessage(answer, mode, sources) {
  document.getElementById("loadingMsg")?.remove();
  const div = document.createElement("div");
  div.className = "msg assistant";
  const modeLabel = mode === "llm" ? "Generated answer" : mode === "extractive" ? "Extractive (no LLM running)" : "No match";
  const sourcesHtml = sources.length
    ? `<div class="sources">${sources.map(s => `<div class="source-chip"><b>${escapeHtml(s.source)}</b> — relevance ${s.relevance_score}</div>`).join("")}</div>`
    : "";
  div.innerHTML = `
    <div class="role">DocumentIntel</div>
    <div class="bubble">${escapeHtml(answer)}<div class="mode-tag">${modeLabel}</div>${sourcesHtml}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function askQuestion() {
  const question = questionInput.value.trim();
  if (!question) return;
  addUserMessage(question);
  questionInput.value = "";
  sendBtn.disabled = true;
  addLoadingMessage();

  try {
    const res = await fetch(`${API}/api/query`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    const data = await res.json();
    addAssistantMessage(data.answer, data.mode, data.sources || []);
  } catch (err) {
    document.getElementById("loadingMsg")?.remove();
    addAssistantMessage(`Error: ${err.message}`, "none", []);
  }
  sendBtn.disabled = false;
}

sendBtn.addEventListener("click", askQuestion);
questionInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") askQuestion();
});

refreshStatus();
refreshDocs();
setInterval(refreshStatus, 15000);
</script>
</body>
</html>
